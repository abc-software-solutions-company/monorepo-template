server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Global configuration
  charset utf-8;
  
  # Handle OPTIONS method for CORS preflight requests
  if ($request_method = 'OPTIONS') {
    return 204;
  }

  # Primary location for SPA
  location / {
    # First attempt to serve the requested URI
    # If not found, try index.html (for SPA routing)
    try_files $uri $uri/ /index.html;
    
    # Add CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Content-Type' 'text/html; charset=utf-8' always;
  }

  # For all direct SPA routes - send to index.html
  location ~ ^/[a-zA-Z0-9\-\/]*$ {
    # Exclude paths that should be treated as static files
    try_files /index.html =404;
  }

  # For OPTIONS requests
  location ~ ^.+$ {
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
      add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Content-Type' 'text/plain charset=UTF-8' always;
      add_header 'Content-Length' 0 always;
      return 204;
    }
  }

  # Serve static files with cache
  location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|otf)$ {
    expires 6M;
    access_log off;
    add_header Cache-Control "public" always;
    add_header 'Access-Control-Allow-Origin' '*' always;
  }

  # Return 404 for all .json files
  location ~ \.json$ {
    try_files $uri =404;
  }

  # Enable browser cache for assets with hashes in filename
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2|woff)(\?[a-f0-9]+)?$ {
    expires 1M;
    access_log off;
    add_header Cache-Control "public" always;
  }
}