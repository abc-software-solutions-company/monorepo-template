name: Create AWS S3 Bucket in AP Southeast 1

on:
  workflow_dispatch:
    inputs:
      bucket_name:
        description: 'S3 Bucket Name'
        required: true
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production

jobs:
  create-s3-bucket:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    concurrency:
      group: create-s3-bucket-${{ github.event.inputs.environment }}
      cancel-in-progress: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'ap-southeast-1'
      
      - name: Create S3 Bucket
        run: |
          chmod +x ./scripts/create_s3.sh
          ./scripts/create_s3.sh \
            "${{ github.event.inputs.bucket_name }}-${{ github.event.inputs.environment }}" \
            "ap-southeast-1" 