name: Backup Postgres Containers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        type: string

jobs:
  backup-postgres:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Backup Postgres data
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR="/tmp/postgres_backup_${TIMESTAMP}"

          ssh $VPS_USER@$VPS_HOST "TIMESTAMP='$TIMESTAMP' bash -s" << 'EOF'
            BACKUP_DIR="/tmp/postgres_backup_${TIMESTAMP}"
            mkdir -p $BACKUP_DIR/configs

            echo "=== Starting Postgres backup ==="

            # Backup all postgres container configurations
            echo "=== Backing up Docker container configurations ==="
            docker ps -a --format '{{.Names}}' | grep -i postgres | while read container; do
              echo "Exporting configuration for container: $container"

              # Save full docker inspect to JSON
              docker inspect $container > $BACKUP_DIR/configs/${container}_inspect.json
              echo "✓ Saved inspect data: ${container}_inspect.json"

              # Extract docker-compose file if it exists
              COMPOSE_FILE=$(docker inspect $container | grep -o 'com.docker.compose.project.config_files.*' | cut -d'"' -f3 | head -1)
              if [ -n "$COMPOSE_FILE" ] && [ -f "$COMPOSE_FILE" ]; then
                cp "$COMPOSE_FILE" $BACKUP_DIR/configs/${container}_docker-compose.yml
                echo "✓ Copied docker-compose file: $COMPOSE_FILE"
              fi
            done

            # Backup all postgres volumes
            echo "=== Backing up Postgres volumes ==="
            docker volume ls --format '{{.Name}}' | grep -i postgres | while read volume; do
              echo "Backing up volume: $volume"
              docker run --rm -v $volume:/data -v $BACKUP_DIR:/backup alpine tar czf /backup/${volume}_${TIMESTAMP}.tar.gz -C /data . && \
                echo "✓ Successfully backed up volume: $volume" || \
                echo "✗ Failed to backup volume: $volume"
            done

            echo "=== Backup completed ==="
            echo "Backup location: $BACKUP_DIR"
            echo "Configuration files:"
            ls -lh $BACKUP_DIR/configs/
            echo "Volume backups:"
            ls -lh $BACKUP_DIR/*.tar.gz 2>/dev/null || echo "No volume backups created"
          EOF

          # Download backups from VPS to GitHub runner
          echo "=== Downloading backups from VPS ==="
          mkdir -p ./backups
          scp -r $VPS_USER@$VPS_HOST:$BACKUP_DIR/* ./backups/

          # Cleanup remote backup
          ssh $VPS_USER@$VPS_HOST "rm -rf $BACKUP_DIR"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure S3 lifecycle policy
        env:
          S3_BUCKET: ${{ secrets.S3_BACKUP_BUCKET }}
        run: |
          echo "=== Configuring S3 lifecycle policy ==="

          # Create lifecycle policy configuration
          cat > lifecycle-policy.json << 'POLICY'
          {
            "Rules": [
              {
                "Id": "DeleteOldBackups",
                "Status": "Enabled",
                "Prefix": "postgres/",
                "Expiration": {
                  "Days": 7
                }
              }
            ]
          }
          POLICY

          # Apply lifecycle policy to S3 bucket
          aws s3api put-bucket-lifecycle-configuration \
            --bucket ${S3_BUCKET} \
            --lifecycle-configuration file://lifecycle-policy.json

          echo "✓ Lifecycle policy applied successfully"

          # Verify the policy
          aws s3api get-bucket-lifecycle-configuration --bucket ${S3_BUCKET}

      - name: Upload backups to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BACKUP_BUCKET }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          S3_PATH="s3://${S3_BUCKET}/postgres/${ENVIRONMENT}/${TIMESTAMP}/"

          echo "=== Uploading backups to S3 ==="
          aws s3 cp ./backups/ $S3_PATH --recursive

          echo "✓ Backups uploaded to: $S3_PATH"
          aws s3 ls $S3_PATH

      - name: Cleanup local backups
        if: always()
        run: rm -rf ./backups
