name: Setup Infrastructure Network

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to set up network in'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
      force_recreate:
        description: 'Force recreate network even if in use'
        required: false
        default: false
        type: boolean

env:
  NETWORK_NAME: abc_infra

jobs:
  setup-network:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    concurrency:
      group: setup-infra-network-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Check if script already exists to avoid unnecessary copy
      - name: Check if script exists on VPS
        id: check_script
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if ssh $VPS_USER@$VPS_HOST "[ -f /home/$VPS_USER/create_docker_network.sh ]"; then
            # Get hash of local script
            LOCAL_HASH=$(sha256sum scripts/create_docker_network.sh | awk '{print $1}')
            # Get hash of remote script
            REMOTE_HASH=$(ssh $VPS_USER@$VPS_HOST "sha256sum /home/$VPS_USER/create_docker_network.sh" | awk '{print $1}')
            
            if [ "$LOCAL_HASH" = "$REMOTE_HASH" ]; then
              echo "Script already exists and is up to date"
              echo "script_needs_update=false" >> $GITHUB_OUTPUT
            else
              echo "Script exists but needs update"
              echo "script_needs_update=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Script does not exist on VPS"
            echo "script_needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Copy network creation script to VPS
        if: steps.check_script.outputs.script_needs_update == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp scripts/create_docker_network.sh $VPS_USER@$VPS_HOST:/home/$VPS_USER/
          ssh $VPS_USER@$VPS_HOST "chmod +x /home/$VPS_USER/create_docker_network.sh"
          echo "Network creation script copied to VPS"

      - name: Create Docker network on VPS
        id: create_network
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          FORCE_RECREATE: ${{ github.event.inputs.force_recreate }}
        run: |
          # Run with set -e to fail on any error
          set -e
          
          # Pass force_recreate flag to the script if needed
          if [ "$FORCE_RECREATE" = "true" ]; then
            ssh $VPS_USER@$VPS_HOST "/home/$VPS_USER/create_docker_network.sh --force"
          else
            ssh $VPS_USER@$VPS_HOST "/home/$VPS_USER/create_docker_network.sh"
          fi
          
          echo "Docker infrastructure network setup completed"
          
      - name: Verify network configuration
        if: success()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          # Use set +e to prevent the command from failing if network doesn't exist
          set +e
          
          echo "Verifying network: $NETWORK_NAME"
          
          # Run the inspect command and capture both stdout and exit code
          OUTPUT=$(ssh $VPS_USER@$VPS_HOST "docker network inspect $NETWORK_NAME 2>&1")
          EXIT_CODE=$?
          
          # Output the result for debugging
          echo "$OUTPUT"
          
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "No such network"; then
              echo "::error::Network '$NETWORK_NAME' was not found after creation attempt"
              exit 1
            else
              echo "::error::Error inspecting network: $OUTPUT"
              exit 1
            fi
          else
            echo "Network '$NETWORK_NAME' configuration:"
            echo "$OUTPUT" | grep -E "Name|Driver|Attachable" -A1 || true
            echo "✅ Network verification successful"
          fi 