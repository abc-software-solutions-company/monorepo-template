name: Update DB User Permissions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
      db_name:
        description: 'Target database name'
        required: true
      db_user:
        description: 'Database user to update permissions for'
        required: true

jobs:
  update-permissions:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    concurrency:
      group: db-user-${{ github.event.inputs.environment }}-${{ github.event.inputs.db_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy scripts to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          # Create scripts directory if it doesn't exist
          ssh $VPS_USER@$VPS_HOST "mkdir -p /home/$VPS_USER/infra/scripts"
          
          # Generate checksum of local scripts
          LOCAL_CHECKSUM=$(find scripts -name "*.sh" -type f -exec md5sum {} \; | sort | md5sum | cut -d ' ' -f1)
          
          # Check if we need to update scripts
          REMOTE_FILE_EXISTS=$(ssh $VPS_USER@$VPS_HOST "test -f /home/$VPS_USER/infra/scripts/.checksum && echo 'yes' || echo 'no'")
          
          if [ "$REMOTE_FILE_EXISTS" = "yes" ]; then
            REMOTE_CHECKSUM=$(ssh $VPS_USER@$VPS_HOST "cat /home/$VPS_USER/infra/scripts/.checksum")
            
            if [ "$LOCAL_CHECKSUM" = "$REMOTE_CHECKSUM" ]; then
              echo "Scripts are up to date, skipping copy"
              COPY_NEEDED="no"
            else
              echo "Scripts have been modified, updating..."
              COPY_NEEDED="yes"
            fi
          else
            echo "First time setup, copying scripts..."
            COPY_NEEDED="yes"
          fi
          
          # Copy scripts if needed
          if [ "$COPY_NEEDED" = "yes" ]; then
            scp scripts/*.sh $VPS_USER@$VPS_HOST:/home/$VPS_USER/infra/scripts/
            ssh $VPS_USER@$VPS_HOST "chmod +x /home/$VPS_USER/infra/scripts/*.sh"
            echo "$LOCAL_CHECKSUM" | ssh $VPS_USER@$VPS_HOST "cat > /home/$VPS_USER/infra/scripts/.checksum"
            echo "Scripts copied and updated"
          fi

      - name: Update DB user permissions
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -e
          echo "Updating permissions for user ${{ github.event.inputs.db_user }} on database ${{ github.event.inputs.db_name }}..."
          ssh $VPS_USER@$VPS_HOST "bash /home/$VPS_USER/infra/scripts/update_user_permissions.sh \
            '${{ github.event.inputs.db_name }}' \
            '${{ github.event.inputs.db_user }}' \
            '$POSTGRES_USER' \
            '$POSTGRES_PASSWORD'"
          echo "Database user permissions updated successfully!"

      - name: Clean up scripts (optional)
        if: false # Set to true if you want to remove scripts after execution
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST "rm -rf /home/$VPS_USER/infra/scripts"
          echo "Scripts removed from VPS"