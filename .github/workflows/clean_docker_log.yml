name: Clean Docker Logs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        type: string

jobs:
  clean-docker-logs:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Clean docker logs
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "If running with non-root user, please grant access to /var/lib/docker with command `sudo chmod 701 /var/lib/docker` by use root account first"
          echo "Clearing Docker log files..."
          ssh $VPS_USER@$VPS_HOST "truncate -s 0 /var/lib/docker/containers/*/*.log"
          echo "Docker log files cleared."

          echo "Check VPS disk usage after clearing logs:"
          ssh $VPS_USER@$VPS_HOST "df -h /"