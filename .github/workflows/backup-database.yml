name: Database Backup

on:
  # Run daily at midnight GMT+7 (17:00 UTC)
  schedule:
    - cron: '0 17 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        default: 'production'
        type: choice
        options:
          - stage
          - production

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency:
      group: db-backup-${{ github.event.inputs.environment || 'production' }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup directory
        run: mkdir -p backups

      - name: Backup PostgreSQL database
        env:
          DB_URL: ${{ secrets.DB_URL_REMOTE }}
        run: |
          # Extract database name from DB_URL
          # Format: postgresql://[user[:password]@][host][:port][/dbname]
          DBNAME=$(echo "$DB_URL" | sed -n 's|.*//[^/]*/\([^?]*\).*|\1|p')

          if [ -z "$DBNAME" ]; then
            echo "Error: Could not extract database name from DB_URL"
            exit 1
          fi

          TIMESTAMP=$(TZ='Asia/Bangkok' date +%Y-%m-%d_%H-%M-%S)
          ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
          BACKUP_FILE="backups/${DBNAME}_${ENVIRONMENT}_${TIMESTAMP}.sql"

          echo "Creating backup for database: $DBNAME"
          echo "Backup file: $BACKUP_FILE"
          pg_dump "$DB_URL" -F p -f "$BACKUP_FILE"

          # Compress the backup
          gzip "$BACKUP_FILE"
          echo "BACKUP_FILE=${BACKUP_FILE}.gz" >> $GITHUB_ENV
          echo "Backup created and compressed successfully: ${BACKUP_FILE}.gz"

      - name: Get Microsoft Graph access token
        id: graph_token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.MICROSOFT_GRAPH_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.MICROSOFT_GRAPH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.MICROSOFT_GRAPH_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload backup to SharePoint via Microsoft Graph
        run: |
          FILENAME=$(basename "${{ env.BACKUP_FILE }}")

          curl -X PUT \
            "https://graph.microsoft.com/v1.0/users/${{ secrets.MICROSOFT_GRAPH_SERVICE_ACCOUNT_EMAIL }}/drive/root:/DatabaseBackups/${FILENAME}:/content" \
            -H "Authorization: Bearer ${{ steps.graph_token.outputs.access_token }}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@${{ env.BACKUP_FILE }}" \
            --fail-with-body

          echo "Backup uploaded to SharePoint successfully: ${FILENAME}"

      - name: Clean up local backup
        if: always()
        run: rm -rf backups
