name: Database Backup

# This workflow backs up PostgreSQL databases and uploads them to SharePoint/OneDrive
#
# Required GitHub Secrets:
# - DB_URL_REMOTE: PostgreSQL connection string (postgresql://user:password@host:port/dbname)
# - MICROSOFT_GRAPH_TENANT_ID: Azure AD tenant ID
# - MICROSOFT_GRAPH_CLIENT_ID: Azure AD application (client) ID
# - MICROSOFT_GRAPH_CLIENT_SECRET: Azure AD client secret
# - MICROSOFT_GRAPH_SHAREPOINT_HOSTNAME: SharePoint hostname (e.g., abcdigitalio.sharepoint.com)
# - MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME: SharePoint site name (e.g., ABCdigital)
# - MICROSOFT_GRAPH_SHAREPOINT_PATH: Folder path in SharePoint
#   Examples:
#     - "Shared Documents/Backups"
#     - "Shared Documents/Database/Production"
#   Note: Must start with "Shared Documents" for document libraries

on:
  # Run daily at midnight GMT+7 (17:00 UTC)
  schedule:
    - cron: '0 17 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        default: 'production'
        type: choice
        options:
          - stage
          - production

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    concurrency:
      group: db-backup-${{ github.event.inputs.environment || 'production' }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup directory
        run: mkdir -p backups

      - name: Backup PostgreSQL database
        env:
          DB_URL: ${{ secrets.DB_URL_REMOTE }}
        run: |
          # Extract database name from DB_URL
          # Format: postgresql://[user[:password]@][host][:port][/dbname]
          DBNAME=$(echo "$DB_URL" | sed -n 's|.*//[^/]*/\([^?]*\).*|\1|p')

          if [ -z "$DBNAME" ]; then
            echo "Error: Could not extract database name from DB_URL"
            exit 1
          fi

          TIMESTAMP=$(TZ='Asia/Bangkok' date +%Y-%m-%d_%H-%M-%S)
          ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
          BACKUP_FILE="backups/${DBNAME}_${ENVIRONMENT}_${TIMESTAMP}.sql"

          echo "Creating backup for database: $DBNAME"
          echo "Backup file: $BACKUP_FILE"
          pg_dump "$DB_URL" -F p -f "$BACKUP_FILE"

          # Compress the backup
          gzip "$BACKUP_FILE"
          echo "BACKUP_FILE=${BACKUP_FILE}.gz" >> $GITHUB_ENV
          echo "Backup created and compressed successfully: ${BACKUP_FILE}.gz"

      - name: Get Microsoft Graph access token
        id: graph_token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.MICROSOFT_GRAPH_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.MICROSOFT_GRAPH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.MICROSOFT_GRAPH_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Get SharePoint site ID
        id: sharepoint_site
        run: |
          SITE_INFO=$(curl -s -X GET \
            "https://graph.microsoft.com/v1.0/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_HOSTNAME }}:/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}" \
            -H "Authorization: Bearer ${{ steps.graph_token.outputs.access_token }}")

          SITE_ID=$(echo $SITE_INFO | jq -r '.id')

          if [ "$SITE_ID" == "null" ] || [ -z "$SITE_ID" ]; then
            echo "Error: Could not get SharePoint site ID"
            echo "Response: $SITE_INFO"
            exit 1
          fi

          echo "SharePoint Site ID: $SITE_ID"
          echo "site_id=$SITE_ID" >> $GITHUB_OUTPUT

      - name: Upload backup to SharePoint via Microsoft Graph
        env:
          SHAREPOINT_PATH: ${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_PATH }}
        run: |
          FILENAME=$(basename "${{ env.BACKUP_FILE }}")

          # Use configured SharePoint path or default to "Shared Documents/Backups"
          UPLOAD_PATH="${SHAREPOINT_PATH:-Shared Documents/Backups}"

          echo "Uploading to SharePoint site: ${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}"
          echo "Path: ${UPLOAD_PATH}/${FILENAME}"

          curl -X PUT \
            "https://graph.microsoft.com/v1.0/sites/${{ steps.sharepoint_site.outputs.site_id }}/drive/root:/${UPLOAD_PATH}/${FILENAME}:/content" \
            -H "Authorization: Bearer ${{ steps.graph_token.outputs.access_token }}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@${{ env.BACKUP_FILE }}" \
            --fail-with-body

          echo "Backup uploaded to SharePoint successfully!"
          echo "Location: https://${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_HOSTNAME }}/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}/${UPLOAD_PATH}/${FILENAME}"

      - name: Clean up local backup
        if: always()
        run: rm -rf backups
