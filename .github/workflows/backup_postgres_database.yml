name: Backup Postgres Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Environment to backup'
        required: true
        type: string

jobs:
  backup-postgres:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Backup Postgres data
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR="/tmp/postgres_backup_${TIMESTAMP}"
          POSTGRES_DATA_PATH="/home/${VPS_USER}/postgres"

          ssh $VPS_USER@$VPS_HOST "TIMESTAMP='$TIMESTAMP' POSTGRES_DATA_PATH='$POSTGRES_DATA_PATH' bash -s" << 'EOF'
            BACKUP_DIR="/tmp/postgres_backup_${TIMESTAMP}"
            mkdir -p $BACKUP_DIR

            echo "🚀 Starting Postgres backup"
            echo "📁 Postgres data path: $POSTGRES_DATA_PATH"

            # Check if postgres data directory exists
            if [ ! -d "$POSTGRES_DATA_PATH" ]; then
              echo "❌ Postgres data directory does not exist: $POSTGRES_DATA_PATH"
              exit 1
            fi

            # Backup postgres data directory
            echo "💾 Backing up Postgres data from: $POSTGRES_DATA_PATH"
            tar czf $BACKUP_DIR/postgres_data_${TIMESTAMP}.tar.gz -C $POSTGRES_DATA_PATH . && \
              echo "✅ Successfully backed up Postgres data" || \
              (echo "❌ Failed to backup Postgres data" && exit 1)

            # Backup docker inspect configuration
            echo "🐳 Backing up Docker container configuration"
            docker inspect postgres > $BACKUP_DIR/postgres_docker_inspect_${TIMESTAMP}.json && \
              echo "✅ Successfully backed up Docker inspect configuration" || \
              (echo "❌ Failed to backup Docker inspect configuration" && exit 1)

            echo "🎉 Backup completed"
            echo "📁 Backup location: $BACKUP_DIR"
            echo "📦 Backup files:"
            ls -lh $BACKUP_DIR/
          EOF

          # Download backups from VPS to GitHub runner
          echo "⬇️  Downloading backup from VPS"
          mkdir -p ./backups
          scp -r $VPS_USER@$VPS_HOST:$BACKUP_DIR/* ./backups/
          echo "✅ Download backup from VPS success"

          # Cleanup remote backup
          echo "🧹 Cleaning remote backup from VPS"
          ssh $VPS_USER@$VPS_HOST "rm -rf $BACKUP_DIR"
          echo "✅ Clean remote backup from VPS success"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'ap-southeast-1'

      - name: Upload backups to S3
        env:
          S3_BUCKET: ${{ secrets.DB_BACKUP_BUCKET }}
          ENVIRONMENT: ${{ inputs.environment }}
          BACKUP_FOLDER: ${{ secrets.DB_BACKUP_FOLDER }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          S3_PATH="s3://${S3_BUCKET}/${BACKUP_FOLDER}/${ENVIRONMENT}/${TIMESTAMP}/"

          echo "☁️  Uploading backups to S3 with Glacier Instant Retrieval storage class"
          aws s3 cp ./backups/ $S3_PATH --recursive --storage-class GLACIER_IR

          echo "✅ Backups uploaded to: $S3_PATH"
          aws s3 ls $S3_PATH

      - name: Cleanup local backups
        if: always()
        run: rm -rf ./backups
