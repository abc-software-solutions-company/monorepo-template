name: Test SharePoint Upload

# Simple workflow to test SharePoint/OneDrive upload functionality
# This creates a hello-world.txt file and uploads it to verify credentials and path configuration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production

jobs:
  test-upload:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Create test file
        run: |
          echo "Hello World! This is a test file uploaded at $(date)" > hello-world.txt
          echo "Test file created successfully"

      - name: Get Microsoft Graph access token
        id: graph_token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.MICROSOFT_GRAPH_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.MICROSOFT_GRAPH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.MICROSOFT_GRAPH_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" == "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Error: Could not get access token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "Access token obtained successfully"

      - name: Get SharePoint site ID
        id: sharepoint_site
        run: |
          SITE_INFO=$(curl -s -X GET \
            "https://graph.microsoft.com/v1.0/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_HOSTNAME }}:/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}" \
            -H "Authorization: Bearer ${{ steps.graph_token.outputs.access_token }}")

          SITE_ID=$(echo $SITE_INFO | jq -r '.id')

          if [ "$SITE_ID" == "null" ] || [ -z "$SITE_ID" ]; then
            echo "Error: Could not get SharePoint site ID"
            echo "Response: $SITE_INFO"
            exit 1
          fi

          echo "SharePoint Site ID: $SITE_ID"
          echo "site_id=$SITE_ID" >> $GITHUB_OUTPUT

      - name: Upload test file to SharePoint
        env:
          SHAREPOINT_PATH: ${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_PATH }}
        run: |
          ENVIRONMENT=${{ github.event.inputs.environment }}

          # Use configured SharePoint path or default to "Shared Documents"
          BASE_PATH="${SHAREPOINT_PATH:-Shared Documents}"

          # Add environment to the end of the path
          UPLOAD_PATH="${BASE_PATH}/${ENVIRONMENT}"

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="hello-world-${TIMESTAMP}.txt"

          echo "Uploading test file to SharePoint..."
          echo "Site: ${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}"
          echo "Path: ${UPLOAD_PATH}/${FILENAME}"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT \
            "https://graph.microsoft.com/v1.0/sites/${{ steps.sharepoint_site.outputs.site_id }}/drive/root:/${UPLOAD_PATH}/${FILENAME}:/content" \
            -H "Authorization: Bearer ${{ steps.graph_token.outputs.access_token }}" \
            -H "Content-Type: text/plain" \
            --data-binary "@hello-world.txt")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)

          if [ "$HTTP_STATUS" == "200" ] || [ "$HTTP_STATUS" == "201" ]; then
            echo "✅ Upload successful!"
            echo "File URL: https://${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_HOSTNAME }}/sites/${{ secrets.MICROSOFT_GRAPH_SHAREPOINT_SITE_NAME }}/${UPLOAD_PATH}/${FILENAME}"
          else
            echo "❌ Upload failed with status: $HTTP_STATUS"
            echo "Response: $RESPONSE"
            exit 1
          fi

      - name: Clean up test file
        if: always()
        run: rm -f hello-world.txt
