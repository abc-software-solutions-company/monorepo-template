name: Clean Docker Logs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        type: string

jobs:
  check-disk-usage:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Check disk usage
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "Check total disk space"
          ssh $VPS_USER@$VPS_HOST "df -h /"
          echo "Checking disk usage detail"
          ssh $VPS_USER@$VPS_HOST "du -h / | grep '[0-9]G'"
