name: Scheduled Postgres Backup (Production)

on:
  schedule:
    # Runs at 17:30 UTC every day (00:30 UTC+7 Vietnam time)
    - cron: '30 17 * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  backup-postgres:
    name: Backup Postgres Volumes
    uses: ./.github/workflows/backup_postgres_database.yml
    with:
      environment: production
    secrets: inherit
