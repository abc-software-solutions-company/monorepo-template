name: Install Docker on VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to setup docker'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - production

env:
  DEPLOY_PATH: /home/${{ secrets.VPS_USER }}${{ github.event.inputs.environment == 'production' && '/infra' || '' }}
  SSH_OPTS: -o StrictHostKeyChecking=no -o ConnectTimeout=10

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    concurrency:
      group: install-docker-on-vps-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Install Docker and Docker Compose
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_OPTS: ${{ env.SSH_OPTS }}
        run: |
          echo "Installing Docker ..."
          ssh $SSH_OPTS $VPS_USER@$VPS_HOST "curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh"
          ssh $SSH_OPTS $VPS_USER@$VPS_HOST "sudo usermod -aG docker $VPS_USER"

      - name: Verify docker
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_OPTS: ${{ env.SSH_OPTS }}
        run: |
          echo "Verifying Docker installation..."
          if ssh $SSH_OPTS $VPS_USER@$VPS_HOST "docker --version"; then
            echo "✅ Docker installed successfully"
          else
            echo "❌ Docker installation failed"
            exit 1
          fi
