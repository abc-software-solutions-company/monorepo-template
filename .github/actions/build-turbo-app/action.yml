name: Build Web App with Turbo
description: Builds a web application using Turborepo with environment-specific configuration

inputs:
  environment:
    description: 'Environment to build for (e.g., stage, prod)'
    required: true
  package-filter:
    description: 'Turbo package filter (e.g., @monorepo-template/admin-portal)'
    required: true
  turbo-cache:
    description: 'Whether to enable Turbo caching'
    required: false
    default: 'true'
  additional-args:
    description: 'Additional arguments to pass to Turbo'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Cache turbo
      if: ${{ inputs.turbo-cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: .turbo/cache
        key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', 'yarn.lock') }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Build web app with turbo
      shell: bash
      run: yarn turbo run build:${{ inputs.environment }} --filter=${{ inputs.package-filter }} ${{ inputs.additional-args }}
