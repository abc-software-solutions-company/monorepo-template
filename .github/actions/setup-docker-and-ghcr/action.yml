name: Setup Docker and GHCR
description: Sets up Docker with QEMU, Buildx, and logs in to GHCR

inputs:
  registry:
    description: 'Docker registry to login to'
    required: false
    default: 'ghcr.io'
  username:
    description: 'GitHub username for registry login'
    required: true
  github-token:
    description: 'GitHub token for registry login'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        install: true
        platforms: linux/amd64

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.github-token }}
